<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sKANnA</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --surface-color: #313244;
            --surface-hover: #45475a;
            --text-color: #cdd6f4;
            --subtext: #a6adc8;
            --primary-color: #89b4fa;
            --success-color: #a6e3a1;
            --warning-color: #f9e2af;
            --error-color: #f38ba8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { color: var(--primary-color); }

        .container {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 1000px;
            width: 100%;
            box-sizing: border-box;
            transition: max-width 0.3s ease;
        }

        .config-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Selettore modalità di quiz */
        .quiz-mode-selector {
            display: flex;
            background-color: var(--surface-hover);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 10px;
            align-self: center;
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--subtext);
            padding: 8px 16px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            color: var(--text-color);
        }

        .mode-btn.active {
            background-color: var(--primary-color);
            color: #11111b;
        }

        /* Scelte multiple per Romaji -> Kana */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto 20px auto;
        }

        .option-btn {
            position: relative;
            background-color: var(--surface-hover);
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 22px 15px 15px 15px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 85px;
            box-sizing: border-box;
        }

        .option-badge {
            position: absolute;
            top: 6px;
            left: 8px;
            font-size: 0.75rem;
            color: var(--subtext);
            background-color: rgba(255, 255, 255, 0.08);
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: bold;
            pointer-events: none;
            line-height: 1.2;
        }

        .option-btn:hover {
            background-color: #585b70;
            border-color: var(--primary-color);
        }

        .option-btn.correct {
            background-color: rgba(166, 227, 161, 0.2) !important;
            border-color: var(--success-color) !important;
            color: var(--success-color) !important;
        }

        .option-btn.wrong {
            background-color: rgba(243, 139, 168, 0.2) !important;
            border-color: var(--error-color) !important;
            color: var(--error-color) !important;
        }

        /* Tabelle di selezione */
        .tables-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .table-wrapper {
            flex: 1;
            min-width: 0;
            background-color: var(--surface-hover);
            border-radius: 8px;
            padding: 15px;
        }

        .table-wrapper h4 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.2rem;
        }

        .table-wrapper h4.hira-title {
            color: #f5c2e7;
        }

        .table-wrapper h4.kata-title {
            color: #89b4fa;
        }

        table.kana-table {
            width: 100%;
            border-collapse: collapse;
        }

        table.kana-table th, table.kana-table td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        table.kana-table th {
            color: var(--subtext);
            font-weight: bold;
            font-size: 0.9rem;
        }

        table.kana-table tr {
            cursor: pointer;
            transition: background-color 0.15s;
        }

        table.kana-table tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        table.kana-table tr.selected-row {
            background-color: rgba(137, 180, 250, 0.12);
        }

        table.kana-table.hira-table tr.selected-row {
            background-color: rgba(245, 194, 231, 0.12);
        }

        table.kana-table td.group-label {
            color: var(--text-color);
            font-weight: bold;
            text-align: left;
            padding-left: 8px;
            font-size: 0.95rem;
        }

        table.kana-table.hira-table td:not(.group-label) {
            color: #f5c2e7;
            font-size: 1.15rem;
            font-weight: 500;
        }

        table.kana-table.kata-table td:not(.group-label) {
            color: #89b4fa;
            font-size: 1.15rem;
            font-weight: 500;
        }

        table.kana-table td .romaji-text {
            display: block;
            font-size: 0.75rem;
            color: var(--subtext);
            opacity: 0.8;
            margin-top: 2px;
            font-weight: normal;
        }

        @media (max-width: 768px) {
            .tables-container {
                flex-direction: column;
            }
        }

        .quiz-section {
            text-align: center;
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-small {
            background-color: var(--surface-hover);
            color: var(--text-color);
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-small:hover { opacity: 0.8; }

        .hint-text {
            color: var(--warning-color);
            font-weight: bold;
            min-height: 24px;
            margin-bottom: 10px;
        }

        .kana-display {
            font-size: 8rem;
            margin: 0 0 20px 0;
            font-weight: bold;
            line-height: 1;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            font-size: 1.5rem;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid var(--surface-hover);
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            width: 150px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button.primary {
            background-color: var(--primary-color);
            color: #11111b;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button.secondary {
            background-color: var(--surface-hover);
            color: var(--text-color);
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover { opacity: 0.8; }

        .feedback {
            margin-top: 15px;
            font-size: 1.2rem;
            height: 24px;
            font-weight: bold;
        }

        .stats {
            margin-top: 20px;
            font-size: 1rem;
            color: var(--subtext);
            border-top: 1px solid var(--surface-hover);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <h1>sKANnA</h1>

    <div class="container">
        <div class="config-section" id="configSection">
            <h3 style="margin-bottom: 5px; text-align: center;">Scegli i Kana per il Quiz</h3>

            <div class="tables-container">
                <!-- Tabella Hiragana -->
                <div class="table-wrapper">
                    <h4 class="hira-title">Hiragana (<span id="hiraCountHeader">0</span>)</h4>
                    <table class="kana-table hira-table">
                        <thead>
                            <tr>
                                <th style="width: 25px;"><input type="checkbox" id="selectAllHira" onclick="toggleSelectAll('hira', this.checked)"></th>
                                <th style="text-align: left; padding-left: 8px;">Gruppo</th>
                                <th>A</th>
                                <th>I</th>
                                <th>U</th>
                                <th>E</th>
                                <th>O</th>
                            </tr>
                        </thead>
                        <tbody id="hiraTableBody"></tbody>
                    </table>
                </div>
                
                <!-- Tabella Katakana -->
                <div class="table-wrapper">
                    <h4 class="kata-title">Katakana (<span id="kataCountHeader">0</span>)</h4>
                    <table class="kana-table kata-table">
                        <thead>
                            <tr>
                                <th style="width: 25px;"><input type="checkbox" id="selectAllKata" onclick="toggleSelectAll('kata', this.checked)"></th>
                                <th style="text-align: left; padding-left: 8px;">Gruppo</th>
                                <th>A</th>
                                <th>I</th>
                                <th>U</th>
                                <th>E</th>
                                <th>O</th>
                            </tr>
                        </thead>
                        <tbody id="kataTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tableSelectionSummary" style="text-align: center; margin: 5px 0 15px 0; font-size: 1.05rem; color: var(--text-color); font-weight: 600; letter-spacing: 0.5px;"></div>

            <div class="start-buttons-container" style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px; width: 100%;">
                <div style="display: flex; gap: 15px;">
                    <button class="primary" style="flex: 1; padding: 12px;" onclick="selectModeAndStart('kana_to_romaji')">Singoli: Kana → Romaji</button>
                    <button class="primary" style="flex: 1; padding: 12px; background-color: #cba6f7; color: #11111b;" onclick="selectModeAndStart('romaji_to_kana')">Singoli: Romaji → Kana</button>
                </div>
                <div style="display: flex; gap: 15px;">
                    <button class="primary" style="flex: 1; padding: 12px; background-color: #a6e3a1; color: #11111b;" onclick="selectModeAndStart('kana_to_romaji_phrases')">Frasi: Kana → Romaji</button>
                    <button class="primary" style="flex: 1; padding: 12px; background-color: #f9e2af; color: #11111b;" onclick="selectModeAndStart('romaji_to_kana_phrases')">Frasi: Romaji → Kana</button>
                </div>
            </div>
        </div>

        <div class="quiz-section" id="quizSection">
            <div class="top-bar">
                <button class="btn-small" onclick="stopQuiz()">← Cambia Filtri</button>
                <span id="alfabetoCorrente" style="color: var(--subtext); font-size: 0.9rem;"></span>
            </div>
            
            <div class="hint-text" id="firstTimeHint"></div>
            
            <div class="kana-display" id="kanaDisplay">あ</div>
            
            <div class="controls" id="textInputControls">
                <input type="text" id="answerInput" placeholder="romaji" autocomplete="off">
            </div>
            
            <div class="controls" id="actionButtonsControls">
                <button class="primary" onclick="checkAnswer()">Verifica</button>
                <button class="secondary" onclick="showSolution()">Non ricordo</button>
            </div>

            <div class="options-grid" id="optionsGrid" style="display: none;"></div>
            
            <div class="feedback" id="feedback"></div>
            <div class="stats" id="stats">Punteggio: 0 | Errori: 0</div>
            <div id="quizSelectionSummary" style="font-size: 0.8rem; color: var(--subtext); margin-top: 10px; opacity: 0.75;"></div>
        </div>
    </div>

    <script>
        const kanaData = {
            "Vocali": { h: ['あ:a','い:i','う:u','え:e','お:o'], k: ['ア:a','イ:i','ウ:u','エ:e','オ:o'] },
            "K": { h: ['か:ka','き:ki','く:ku','け:ke','こ:ko'], k: ['カ:ka','キ:ki','ク:ku','ケ:ke','コ:ko'] },
            "S": { h: ['さ:sa','し:shi','す:su','せ:se','そ:so'], k: ['サ:sa','シ:shi','ス:su','セ:se','ソ:so'] },
            "T": { h: ['た:ta','ち:chi','つ:tsu','て:te','と:to'], k: ['タ:ta','チ:chi','ツ:tsu','テ:te','ト:to'] },
            "N": { h: ['な:na','に:ni','ぬ:nu','ね:ne','の:no'], k: ['ナ:na','ニ:ni','ヌ:nu','ネ:ne','ノ:no'] },
            "H": { h: ['は:ha','ひ:hi','ふ:fu','へ:he','ほ:ho'], k: ['ハ:ha','ヒ:hi','フ:fu','ヘ:he','ホ:ho'] },
            "M": { h: ['ま:ma','み:mi','む:mu','め:me','も:mo'], k: ['マ:ma','ミ:mi','ム:mu','メ:me','モ:mo'] },
            "Y": { h: ['や:ya','ゆ:yu','よ:yo'], k: ['ヤ:ya','ユ:yu','ヨ:yo'] },
            "R": { h: ['ら:ra','り:ri','る:ru','れ:re','ろ:ro'], k: ['ラ:ra','リ:ri','ル:ru','レ:re','ロ:ro'] },
            "W / N": { h: ['わ:wa','を:wo','ん:n'], k: ['ワ:wa','ヲ:wo','ン:n'] }
        };

        const hiraRomajiMap = {};
        const kataRomajiMap = {};

        function convertRomajiToKana(text, scriptType) {
            let result = '';
            let i = 0;
            const map = scriptType === 'Hiragana' ? hiraRomajiMap : kataRomajiMap;
            
            const keys = Object.keys(map).sort((a, b) => b.length - a.length);
            
            while (i < text.length) {
                let matched = false;
                for (const romaji of keys) {
                    if (text.substr(i, romaji.length).toLowerCase() === romaji) {
                        result += map[romaji];
                        i += romaji.length;
                        matched = true;
                        break;
                    }
                }
                if (!matched) {
                    result += text[i];
                    i++;
                }
            }
            return result;
        }

        let activePool = [];
        let currentKana = null;
        let score = 0;
        let mistakes = 0;
        let quizMode = 'kana_to_romaji'; // 'kana_to_romaji' o 'romaji_to_kana'
        let optionSelected = false;
        let questionAnswered = false;
        
        // Memoria persistente delle statistiche di apprendimento
        let kanaStats = {};
        
        // Carica le statistiche da localStorage
        try {
            const stored = localStorage.getItem('sKANnA_stats');
            if (stored) {
                kanaStats = JSON.parse(stored);
            }
        } catch (e) {
            console.error("Errore nel caricamento delle statistiche:", e);
        }

        function recordResult(char, isCorrect) {
            if (!kanaStats[char]) {
                kanaStats[char] = { correct: 0, wrong: 0 };
            }
            if (isCorrect) {
                kanaStats[char].correct++;
            } else {
                kanaStats[char].wrong++;
            }
            
            try {
                localStorage.setItem('sKANnA_stats', JSON.stringify(kanaStats));
            } catch (e) {
                console.error("Errore nel salvataggio delle statistiche:", e);
            }
        }

        function getCharacterWeight(item) {
            const stats = kanaStats[item.kana];
            if (!stats) {
                return 10; // Peso elevato per caratteri mai visti prima (nuovi)
            }
            const correct = stats.correct || 0;
            const wrong = stats.wrong || 0;
            
            // Il peso aumenta con gli errori e diminuisce con le risposte esatte
            // Il peso minimo è 1
            return Math.max(1, 5 + wrong * 3 - correct);
        }

        function selectWeightedRandom(pool) {
            const weights = pool.map(item => getCharacterWeight(item));
            const totalWeight = weights.reduce((acc, w) => acc + w, 0);
            
            let randomThreshold = Math.random() * totalWeight;
            
            for (let i = 0; i < pool.length; i++) {
                randomThreshold -= weights[i];
                if (randomThreshold <= 0) {
                    return pool[i];
                }
            }
            return pool[pool.length - 1];
        }

        function setQuizMode(mode) {
            quizMode = mode;
        }

        function selectModeAndStart(mode) {
            setQuizMode(mode);
            startQuiz();
        }

        function getVowelIndex(romaji) {
            if (romaji === 'n') return 2; // Colonna 'U'
            if (romaji.endsWith('a')) return 0;
            if (romaji.endsWith('i')) return 1;
            if (romaji.endsWith('u')) return 2;
            if (romaji.endsWith('e')) return 3;
            if (romaji.endsWith('o')) return 4;
            return -1;
        }

        function saveSelection(hiraGroups, kataGroups) {
            try {
                const selection = {
                    hira: hiraGroups,
                    kata: kataGroups
                };
                localStorage.setItem('sKANnA_selection', JSON.stringify(selection));
            } catch (e) {
                console.error("Errore nel salvataggio della selezione:", e);
            }
        }

        function toggleSelectAll(type, checked) {
            const classSelector = type === 'hira' ? '.hira-row-cb' : '.kata-row-cb';
            const cbs = document.querySelectorAll(classSelector);
            cbs.forEach(cb => {
                cb.checked = checked;
                const tr = cb.closest('tr');
                if (checked) {
                    tr.classList.add('selected-row');
                } else {
                    tr.classList.remove('selected-row');
                }
            });
            updateSelectionSummary();
        }

        function updateSelectionSummary() {
            let hiraCount = 0;
            let kataCount = 0;

            const hiraCbs = Array.from(document.querySelectorAll('.hira-row-cb'));
            const selectedHiraGroups = hiraCbs.filter(cb => cb.checked).map(cb => cb.value);
            selectedHiraGroups.forEach(group => {
                hiraCount += kanaData[group].h.length;
            });

            const kataCbs = Array.from(document.querySelectorAll('.kata-row-cb'));
            const selectedKataGroups = kataCbs.filter(cb => cb.checked).map(cb => cb.value);
            selectedKataGroups.forEach(group => {
                kataCount += kanaData[group].k.length;
            });

            // Aggiorna lo stato delle checkbox "Seleziona tutti"
            const selectAllHira = document.getElementById('selectAllHira');
            if (selectAllHira) {
                selectAllHira.checked = hiraCbs.length > 0 && hiraCbs.every(cb => cb.checked);
            }
            const selectAllKata = document.getElementById('selectAllKata');
            if (selectAllKata) {
                selectAllKata.checked = kataCbs.length > 0 && kataCbs.every(cb => cb.checked);
            }

            const total = hiraCount + kataCount;
            document.getElementById('hiraCountHeader').innerText = hiraCount;
            document.getElementById('kataCountHeader').innerText = kataCount;
            
            const summaryText = `Selezionati: ${total} caratteri (${hiraCount} Hiragana, ${kataCount} Katakana)`;
            const tableSelectionSummary = document.getElementById('tableSelectionSummary');
            if (tableSelectionSummary) {
                tableSelectionSummary.innerText = summaryText;
            }
            document.getElementById('quizSelectionSummary').innerText = summaryText;

            saveSelection(selectedHiraGroups, selectedKataGroups);
        }

        function toggleRow(event, cbId) {
            const cb = document.getElementById(cbId);
            if (event.target !== cb) {
                cb.checked = !cb.checked;
            }
            const tr = cb.closest('tr');
            if (cb.checked) {
                tr.classList.add('selected-row');
            } else {
                tr.classList.remove('selected-row');
            }
            updateSelectionSummary();
        }

        window.onload = () => {
            const hiraTableBody = document.getElementById('hiraTableBody');
            const kataTableBody = document.getElementById('kataTableBody');
            
            // Popola le mappe romaji -> kana per la conversione automatica e per le frasi
            Object.keys(kanaData).forEach(group => {
                kanaData[group].h.forEach(item => {
                    const [kana, romaji] = item.split(':');
                    hiraRomajiMap[romaji] = kana;
                });
                kanaData[group].k.forEach(item => {
                    const [kana, romaji] = item.split(':');
                    kataRomajiMap[romaji] = kana;
                });
            });

            // Carica la selezione salvata, se presente
            let savedSelection = null;
            try {
                const stored = localStorage.getItem('sKANnA_selection');
                if (stored) {
                    savedSelection = JSON.parse(stored);
                }
            } catch (e) {
                console.error("Errore nel caricamento della selezione:", e);
            }

            Object.keys(kanaData).forEach(group => {
                let isHiraChecked = false;
                let isKataChecked = false;

                if (savedSelection) {
                    isHiraChecked = savedSelection.hira.includes(group);
                    isKataChecked = savedSelection.kata.includes(group);
                } else {
                    isHiraChecked = (group === 'Vocali' || group === 'K');
                    isKataChecked = (group === 'Vocali' || group === 'K');
                }

                const hiraCheckedAttr = isHiraChecked ? 'checked' : '';
                const hiraSelectedClass = isHiraChecked ? 'selected-row' : '';

                const kataCheckedAttr = isKataChecked ? 'checked' : '';
                const kataSelectedClass = isKataChecked ? 'selected-row' : '';

                // Riga Hiragana
                const hiraTr = document.createElement('tr');
                hiraTr.className = hiraSelectedClass;
                const hiraCbId = `hira-cb-${group.replace(/\s+/g, '-')}`;
                hiraTr.onclick = (e) => toggleRow(e, hiraCbId);
                
                const hiraRowCells = Array(5).fill('');
                kanaData[group].h.forEach(item => {
                    const [kana, romaji] = item.split(':');
                    const idx = getVowelIndex(romaji);
                    if (idx !== -1) {
                        hiraRowCells[idx] = `${kana}<span class="romaji-text">(${romaji})</span>`;
                    }
                });

                hiraTr.innerHTML = `
                    <td><input type="checkbox" id="${hiraCbId}" value="${group}" class="hira-row-cb" ${hiraCheckedAttr}></td>
                    <td class="group-label">${group}</td>
                    ${hiraRowCells.map(cell => `<td>${cell}</td>`).join('')}
                `;
                hiraTableBody.appendChild(hiraTr);

                // Riga Katakana
                const kataTr = document.createElement('tr');
                kataTr.className = kataSelectedClass;
                const kataCbId = `kata-cb-${group.replace(/\s+/g, '-')}`;
                kataTr.onclick = (e) => toggleRow(e, kataCbId);

                const kataRowCells = Array(5).fill('');
                kanaData[group].k.forEach(item => {
                    const [kana, romaji] = item.split(':');
                    const idx = getVowelIndex(romaji);
                    if (idx !== -1) {
                        kataRowCells[idx] = `${kana}<span class="romaji-text">(${romaji})</span>`;
                    }
                });

                kataTr.innerHTML = `
                    <td><input type="checkbox" id="${kataCbId}" value="${group}" class="kata-row-cb" ${kataCheckedAttr}></td>
                    <td class="group-label">${group}</td>
                    ${kataRowCells.map(cell => `<td>${cell}</td>`).join('')}
                `;
                kataTableBody.appendChild(kataTr);
            });
            
            // Keydown listener sulla barra di testo per invio/spazio/ESC
            const answerInput = document.getElementById('answerInput');
            answerInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    checkAnswer();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    showSolution();
                }
            });

            // Convertitore automatico da romaji a kana in tempo reale per romaji_to_kana_phrases
            answerInput.addEventListener('input', function() {
                if (quizMode === 'romaji_to_kana_phrases' && currentKana) {
                    const oldVal = this.value;
                    const newVal = convertRomajiToKana(oldVal, currentKana.type);
                    if (oldVal !== newVal) {
                        this.value = newVal;
                        this.setSelectionRange(newVal.length, newVal.length);
                    }
                }
            });

            // Keydown listener globale per tastiera 1,2,3,4 e Escape
            window.addEventListener('keydown', function (e) {
                const quizSection = document.getElementById('quizSection');
                if (quizSection.style.display === 'block') {
                    if (quizMode === 'romaji_to_kana') {
                        if (e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4') {
                            const idx = parseInt(e.key) - 1;
                            const buttons = document.querySelectorAll('.option-btn');
                            if (buttons[idx] && !optionSelected) {
                                buttons[idx].click();
                            }
                        }
                    } else if (quizMode === 'kana_to_romaji' || quizMode.endsWith('_phrases')) {
                        if (e.key === 'Escape') {
                            showSolution();
                        }
                    }
                }
            });
            updateSelectionSummary();
        };

        function buildPool() {
            let pool = [];

            const selectedHiraGroups = Array.from(document.querySelectorAll('.hira-row-cb:checked')).map(cb => cb.value);
            selectedHiraGroups.forEach(group => {
                kanaData[group].h.forEach(item => {
                    const [kana, romaji] = item.split(':');
                    pool.push({ kana, romaji, type: 'Hiragana' });
                });
            });

            const selectedKataGroups = Array.from(document.querySelectorAll('.kata-row-cb:checked')).map(cb => cb.value);
            selectedKataGroups.forEach(group => {
                kanaData[group].k.forEach(item => {
                    const [kana, romaji] = item.split(':');
                    pool.push({ kana, romaji, type: 'Katakana' });
                });
            });

            return pool;
        }

        function startQuiz() {
            activePool = buildPool();
            
            if (activePool.length === 0) {
                alert("Seleziona almeno un gruppo per iniziare!");
                return;
            }

            score = 0;
            mistakes = 0;
            currentKana = null; // Azzera l'ultimo carattere per evitare filtri sul primo round
            updateStats();
            document.getElementById('feedback').innerText = '';

            document.getElementById('configSection').style.display = 'none';
            document.getElementById('quizSection').style.display = 'block';
            document.querySelector('.container').style.maxWidth = '650px';
            
            nextQuestion();
        }

        function stopQuiz() {
            document.getElementById('configSection').style.display = 'flex';
            document.getElementById('quizSection').style.display = 'none';
            document.querySelector('.container').style.maxWidth = '1000px';
        }

        function generateOptions(correctKana, pool) {
            const options = new Set([correctKana]);
            
            const poolKanas = pool.map(item => item.kana);
            while (options.size < Math.min(4, poolKanas.length)) {
                const randomKana = poolKanas[Math.floor(Math.random() * poolKanas.length)];
                options.add(randomKana);
            }
            
            if (options.size < 4) {
                const allKanas = [];
                Object.keys(kanaData).forEach(group => {
                    kanaData[group].h.forEach(item => allKanas.push(item.split(':')[0]));
                    kanaData[group].k.forEach(item => allKanas.push(item.split(':')[0]));
                });
                
                while (options.size < 4) {
                    const randomKana = allKanas[Math.floor(Math.random() * allKanas.length)];
                    options.add(randomKana);
                }
            }
            
            return Array.from(options).sort(() => Math.random() - 0.5);
        }

        function selectOption(btn, selectedKana) {
            if (optionSelected) return;
            optionSelected = true;
            
            const feedbackElement = document.getElementById('feedback');
            const buttons = document.querySelectorAll('.option-btn');
            
            if (selectedKana === currentKana.kana) {
                btn.classList.add('correct');
                feedbackElement.innerText = "Corretto!";
                feedbackElement.style.color = "var(--success-color)";
                score++;
                recordResult(currentKana.kana, true);
                updateStats();
                setTimeout(() => {
                    feedbackElement.innerText = '';
                    nextQuestion();
                }, 600);
            } else {
                btn.classList.add('wrong');
                feedbackElement.innerText = `Sbagliato! Era: ${currentKana.kana}`;
                feedbackElement.style.color = "var(--error-color)";
                
                buttons.forEach(b => {
                    if (b.dataset.kana === currentKana.kana) {
                        b.classList.add('correct');
                    }
                });
                
                mistakes++;
                recordResult(currentKana.kana, false);
                updateStats();
                setTimeout(() => {
                    feedbackElement.innerText = '';
                    nextQuestion();
                }, 1500);
            }
        }

        function generatePhrase(scriptType) {
            const hiraSelected = Array.from(document.querySelectorAll('.hira-row-cb:checked')).map(cb => cb.value);
            const kataSelected = Array.from(document.querySelectorAll('.kata-row-cb:checked')).map(cb => cb.value);
            
            let pool = [];
            if (scriptType === 'Hiragana') {
                hiraSelected.forEach(group => {
                    kanaData[group].h.forEach(item => {
                        const [kana, romaji] = item.split(':');
                        pool.push({ kana, romaji });
                    });
                });
            } else {
                kataSelected.forEach(group => {
                    kanaData[group].k.forEach(item => {
                        const [kana, romaji] = item.split(':');
                        pool.push({ kana, romaji });
                    });
                });
            }
            
            if (pool.length === 0) return null;
            
            // Lunghezza casuale da 2 a 5 caratteri
            const len = Math.floor(Math.random() * 4) + 2;
            let kanaStr = '';
            let romajiStr = '';
            
            for (let i = 0; i < len; i++) {
                const char = pool[Math.floor(Math.random() * pool.length)];
                kanaStr += char.kana;
                romajiStr += char.romaji;
            }
            
            return {
                kana: kanaStr,
                romaji: romajiStr,
                type: scriptType
            };
        }

        function nextQuestion() {
            optionSelected = false;
            questionAnswered = false;

            const isPhrasesMode = quizMode.endsWith('_phrases');

            if (isPhrasesMode) {
                const hiraSelected = Array.from(document.querySelectorAll('.hira-row-cb:checked'));
                const kataSelected = Array.from(document.querySelectorAll('.kata-row-cb:checked'));
                
                const scripts = [];
                if (hiraSelected.length > 0) scripts.push('Hiragana');
                if (kataSelected.length > 0) scripts.push('Katakana');
                
                if (scripts.length === 0) {
                    alert("Seleziona almeno un gruppo!");
                    stopQuiz();
                    return;
                }
                
                const scriptType = scripts[Math.floor(Math.random() * scripts.length)];
                
                // Evita ripetizioni consecutive della stessa frase
                let phrase = generatePhrase(scriptType);
                if (currentKana && phrase && phrase.kana === currentKana.kana) {
                    phrase = generatePhrase(scriptType) || phrase;
                }
                currentKana = phrase;
                
                document.getElementById('firstTimeHint').innerText = '';
            } else {
                let pool = activePool;
                if (activePool.length > 1 && currentKana) {
                    const filteredByRomaji = activePool.filter(item => item.romaji !== currentKana.romaji);
                    if (filteredByRomaji.length > 0) {
                        pool = filteredByRomaji;
                    } else {
                        pool = activePool.filter(item => item.kana !== currentKana.kana);
                    }
                }
                currentKana = selectWeightedRandom(pool);
                
                const hintElement = document.getElementById('firstTimeHint');
                const isNew = !kanaStats[currentKana.kana] || 
                              (((kanaStats[currentKana.kana].correct || 0) === 0) && ((kanaStats[currentKana.kana].wrong || 0) === 0));
                if (isNew) {
                    if (quizMode === 'kana_to_romaji') {
                        hintElement.innerText = `💡 Nuovo kana! Romaji: ${currentKana.romaji}`;
                    } else {
                        hintElement.innerText = `💡 Nuovo kana! Risposta: ${currentKana.kana}`;
                    }
                } else {
                    hintElement.innerText = '';
                }
            }

            if (quizMode === 'kana_to_romaji' || quizMode === 'kana_to_romaji_phrases') {
                document.getElementById('textInputControls').style.display = 'flex';
                document.getElementById('actionButtonsControls').style.display = 'flex';
                document.getElementById('optionsGrid').style.display = 'none';

                document.getElementById('kanaDisplay').innerText = currentKana.kana;
                document.getElementById('answerInput').value = '';
                document.getElementById('answerInput').focus();
            } else if (quizMode === 'romaji_to_kana_phrases') {
                document.getElementById('textInputControls').style.display = 'flex';
                document.getElementById('actionButtonsControls').style.display = 'flex';
                document.getElementById('optionsGrid').style.display = 'none';

                document.getElementById('kanaDisplay').innerText = currentKana.romaji;
                document.getElementById('answerInput').value = '';
                document.getElementById('answerInput').focus();
            } else {
                document.getElementById('textInputControls').style.display = 'none';
                document.getElementById('actionButtonsControls').style.display = 'none';
                
                const optionsGrid = document.getElementById('optionsGrid');
                optionsGrid.style.display = 'grid';

                document.getElementById('kanaDisplay').innerText = currentKana.romaji;
                
                const options = generateOptions(currentKana.kana, activePool);
                optionsGrid.innerHTML = '';
                options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'option-btn';
                    btn.dataset.kana = opt;
                    
                    btn.innerHTML = `
                        <span class="option-badge">${index + 1}</span>
                        <span>${opt}</span>
                    `;
                    
                    btn.onclick = () => selectOption(btn, opt);
                    optionsGrid.appendChild(btn);
                });
            }

            document.getElementById('alfabetoCorrente').innerText = currentKana.type;
        }

        function checkAnswer() {
            if (!currentKana || questionAnswered) return;

            const inputElement = document.getElementById('answerInput');
            const feedbackElement = document.getElementById('feedback');
            const userAnswer = inputElement.value.trim().toLowerCase();

            // Se l'input è vuoto, non fare nulla (evita errori accidentali)
            if (userAnswer === "") return; 

            // Determina la risposta corretta in base alla modalità
            const isRomajiToKanaPhrases = (quizMode === 'romaji_to_kana_phrases');
            const correctAnswer = isRomajiToKanaPhrases ? currentKana.kana : currentKana.romaji;

            if (userAnswer === correctAnswer) {
                questionAnswered = true; // Impedisce invii multipli consecutivi durante il timeout
                feedbackElement.innerText = "Corretto!";
                feedbackElement.style.color = "var(--success-color)";
                score++;
                if (!quizMode.endsWith('_phrases')) {
                    recordResult(currentKana.kana, true);
                }
                updateStats();
                setTimeout(() => {
                    feedbackElement.innerText = '';
                    nextQuestion();
                }, 400); 
            } else {
                feedbackElement.innerText = `Sbagliato. Riprova!`;
                feedbackElement.style.color = "var(--error-color)";
                mistakes++;
                if (!quizMode.endsWith('_phrases')) {
                    recordResult(currentKana.kana, false);
                }
                updateStats();
                inputElement.value = '';
                inputElement.focus();
            }
        }

        function showSolution() {
            if (!currentKana) return;
            const feedbackElement = document.getElementById('feedback');
            const inputElement = document.getElementById('answerInput');
            
            const isRomajiToKanaPhrases = (quizMode === 'romaji_to_kana_phrases');
            const solution = isRomajiToKanaPhrases ? currentKana.kana : currentKana.romaji;
            
            feedbackElement.innerText = `La soluzione è: ${solution}`;
            feedbackElement.style.color = "var(--warning-color)";
            
            mistakes++;
            if (!quizMode.endsWith('_phrases')) {
                recordResult(currentKana.kana, false);
            }
            updateStats();
            
            inputElement.value = '';
            inputElement.focus();
        }

        function updateStats() {
            document.getElementById('stats').innerText = `Punteggio: ${score} | Errori: ${mistakes}`;
        }
    </script>
</body>
</html>
